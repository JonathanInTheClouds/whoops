name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      - run: go mod download
      - run: go test -v -race ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64 go build -ldflags "-X main.Version=${VERSION}" -o dist/whoops-darwin-arm64  ./cmd/whoops
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-X main.Version=${VERSION}" -o dist/whoops-darwin-amd64  ./cmd/whoops
          GOOS=linux   GOARCH=amd64 go build -ldflags "-X main.Version=${VERSION}" -o dist/whoops-linux-amd64   ./cmd/whoops
          GOOS=linux   GOARCH=arm64 go build -ldflags "-X main.Version=${VERSION}" -o dist/whoops-linux-arm64   ./cmd/whoops
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.Version=${VERSION}" -o dist/whoops-windows-amd64.exe ./cmd/whoops
          cd dist && sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          name: whoops ${{ github.ref_name }}
          body: |
            ## Installation
            ```bash
            curl -fsSL https://raw.githubusercontent.com/JonathanInTheClouds/whoops/main/install.sh | bash
            ```
          files: |
            dist/whoops-darwin-arm64
            dist/whoops-darwin-amd64
            dist/whoops-linux-amd64
            dist/whoops-linux-arm64
            dist/whoops-windows-amd64.exe
            dist/checksums.txt
